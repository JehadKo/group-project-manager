<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Student Group Project Manager</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header id="site-header"></header>
    <div class="layout-app">
      <aside id="site-sidebar"></aside>
      <main class="page">
        <section class="hero dashboard-hero">
          <div class="dashboard-hero__grid">
            <div>
              <div class="hero__eyebrow">Dashboard</div>
              <h1 id="dashboard-title">Project overview</h1>
              <p id="dashboard-copy">Track group momentum, personal work, and the next upcoming deadlines from one place.</p>
              <div id="dashboard-hero-stats" class="hero__stats" style="margin-top: 1.5rem;"></div>
            </div>
            <div id="dashboard-focus-card" class="dashboard-focus-card"></div>
          </div>
        </section>
        <div id="flash-container" class="flash-stack"></div>
        <section id="dashboard-quick-actions" class="dashboard-action-grid"></section>
        <section id="dashboard-metrics" class="stats-grid"></section>
        <div class="two-column" style="margin-bottom: 1.5rem;">
          <section id="dashboard-overview-chart" class="panel dashboard-panel-tight" style="margin-bottom: 0;"></section>
          <section id="dashboard-insights" class="panel dashboard-panel-tight" style="margin-bottom: 0;"></section>
        </div>
        <div class="two-column" style="margin-bottom: 1.5rem;">
          <section id="dashboard-weekly-chart" class="panel dashboard-panel-tight" style="margin-bottom: 0;"></section>
          <section id="dashboard-type-chart" class="panel dashboard-panel-tight" style="margin-bottom: 0;"></section>
        </div>
        <section class="two-column">
          <div class="panel">
            <div class="split">
              <h2>Upcoming tasks</h2>
              <a class="btn-ghost" href="tasks.html">Manage tasks</a>
            </div>
            <div id="upcoming-tasks" class="list" style="margin-top: 1rem;"></div>
          </div>
          <div class="panel">
            <div class="split">
              <h2>Group progress</h2>
              <a class="btn-ghost" href="groups.html">Open groups</a>
            </div>
            <div id="group-progress" class="list" style="margin-top: 1rem;"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="assets/js/pages/dashboard.js"></script>
  </body>
</html>
