<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Taskly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --ink: #0d0d0d; --paper: #f5f2ec; --cream: #ede9e0; --accent: #c8502a;
      --accent-light: #e8724f; --accent-glow: rgba(200,80,42,0.15);
      --muted: #7a7468; --muted-2: #a09890; --border: rgba(13,13,13,0.11);
      --white: #ffffff; --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'DM Sans', sans-serif; --radius: 10px; --trans: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; cursor: none; }

    .cursor { position: fixed; top: 0; left: 0; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width 0.25s, height 0.25s, background 0.25s; }
    .cursor-ring { position: fixed; top: 0; left: 0; width: 32px; height: 32px; border: 1.5px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); opacity: 0.4; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9000; opacity: 0.35; }

    .auth-wrap { display: grid; grid-template-columns: 520px 1fr; min-height: 100vh; }
    .auth-panel { background: var(--ink); position: sticky; top: 0; height: 100vh; padding: 3rem; display: flex; flex-direction: column; overflow: hidden; }
    .auth-panel::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(200,80,42,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(200,80,42,0.05) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; pointer-events: none; }
    .orb-1 { width: 560px; height: 560px; background: radial-gradient(circle, rgba(200,80,42,0.14) 0%, transparent 65%); top: -180px; right: -160px; animation: orbDrift 14s ease-in-out infinite alternate; }
    .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%); bottom: -60px; left: -80px; animation: orbDrift 10s ease-in-out infinite alternate-reverse; }
    @keyframes orbDrift { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,-30px) scale(1.06); } }

    .panel-content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }
    .logo { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; opacity: 0; animation: fadeIn 0.5s 0.05s forwards; }
    .logo-mark { width: 36px; height: 36px; border-radius: 9px; background: var(--accent); display: grid; place-items: center; transition: transform var(--trans), background var(--trans); }
    .logo:hover .logo-mark { transform: rotate(-6deg) scale(1.06); background: var(--accent-light); }
    .logo-name { font-family: var(--font-display); font-size: 1.5rem; color: var(--white); letter-spacing: -0.01em; }
    .logo-name em { font-style: italic; color: var(--accent-light); }

    .panel-hero { margin: auto 0; padding: 3rem 0; }
    .panel-tag { display: inline-flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); border: 1px solid rgba(200,80,42,0.3); border-radius: 99px; padding: 0.3rem 0.85rem; margin-bottom: 1.75rem; opacity: 0; animation: fadeIn 0.5s 0.15s forwards; }
    .panel-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-light); animation: pulse 2s ease-in-out infinite; }
    .panel-title { font-family: var(--font-display); font-size: 3.4rem; line-height: 1.07; color: var(--white); margin-bottom: 1.25rem; letter-spacing: -0.02em; opacity: 0; animation: fadeUp 0.65s 0.25s forwards; }
    .panel-title em { font-style: italic; color: var(--accent-light); }
    .panel-desc { font-size: 0.9rem; line-height: 1.8; color: rgba(255,255,255,0.4); max-width: 340px; font-weight: 300; opacity: 0; animation: fadeUp 0.65s 0.36s forwards; }

    .auth-form-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 3rem 2rem; background: var(--white); min-height: 100vh; position: relative; }
    .auth-form-panel::before { content: ''; position: absolute; top: 0; right: 0; width: 260px; height: 260px; background: radial-gradient(circle at 100% 0%, rgba(200,80,42,0.06), transparent 70%); pointer-events: none; }
    .auth-form-inner { width: 100%; max-width: 380px; position: relative; z-index: 1; }
    .form-header { margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.55s 0.1s forwards; }
    .form-eyebrow { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
    .form-eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); }
    .form-heading { font-family: var(--font-display); font-size: 2.75rem; line-height: 1.1; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 0.4rem; }
    .form-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

    #flash-container { margin-bottom: 1rem; }
    .flash { padding: 0.7rem 1rem; border-radius: var(--radius); font-size: 0.83rem; font-weight: 500; border: 1px solid; animation: fadeUp 0.3s ease; }
    .flash-error { background: #fff2f0; border-color: #ffd3cc; color: #991414; }
    .flash-success { background: #f0fdf6; border-color: #c6f0da; color: #166534; }

    .form-grid { display: flex; flex-direction: column; gap: 1.1rem; }
    .field { display: flex; flex-direction: column; gap: 0.32rem; }
    .field label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted-2); }
    .field input { padding: 0.72rem 0.95rem; border: 1.5px solid rgba(13,13,13,0.12); border-radius: var(--radius); font-family: var(--font-body); font-size: 0.875rem; color: var(--ink); background: var(--paper); transition: border-color var(--trans), background var(--trans), box-shadow var(--trans), transform var(--trans); outline: none; width: 100%; }
    .field input:hover { border-color: rgba(13,13,13,0.22); }
    .field input:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3.5px var(--accent-glow); transform: translateY(-1px); }
    .field input.input-error { border-color: #e05050; box-shadow: 0 0 0 3px rgba(224,80,80,0.12); }

    .strength-bar { display: flex; gap: 3px; margin-top: 0.4rem; }
    .strength-seg { flex: 1; height: 3px; border-radius: 2px; background: rgba(13,13,13,0.08); transition: background 0.25s; }
    .strength-seg.weak { background: #d94f4f; }
    .strength-seg.fair { background: #d97c2a; }
    .strength-seg.good { background: #c9a84c; }
    .strength-seg.strong { background: #2a7a52; }
    .strength-label { font-size: 0.68rem; color: var(--muted-2); margin-top: 0.2rem; min-height: 1em; }

    .btn-submit { width: 100%; padding: 0.82rem 1rem; background: var(--ink); color: var(--white); border: none; border-radius: 99px; font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; box-shadow: 0 4px 20px rgba(13,13,13,0.2); transition: background var(--trans), transform var(--trans), box-shadow var(--trans); position: relative; overflow: hidden; letter-spacing: 0.01em; margin-top: 0.5rem; }
    .btn-submit:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,80,42,0.35); }

    @keyframes fadeIn { from{ opacity:0; } to{ opacity:1; } }
    @keyframes fadeUp { from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }

    @media (max-width: 900px) { .auth-wrap { grid-template-columns: 1fr; } .auth-panel { display: none; } }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="auth-wrap">
  <aside class="auth-panel">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="panel-content">
      <a href="index.html" class="logo">
        <div class="logo-mark">
          <svg width="17" height="17" viewBox="0 0 20 20" fill="none">
            <polyline points="4,10 8,14 16,6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-name">Task<em>ly</em></span>
      </a>
      <div class="panel-hero">
        <div class="panel-tag">Security</div>
        <h1 class="panel-title">Secure your<br><em>account</em></h1>
        <p class="panel-desc">Set a new password to regain access to your shared workspace.</p>
      </div>
    </div>
  </aside>

  <main class="auth-form-panel">
    <div class="auth-form-inner">
      <div class="form-header">
        <div class="form-eyebrow">Recovery</div>
        <h2 class="form-heading">New<br>password</h2>
        <p class="form-sub">Choose a password that's easy to remember but hard to guess.</p>
      </div>

      <div id="flash-container"></div>

      <form id="reset-form" class="form-grid">
        <div class="field">
          <label for="password">New password</label>
          <input id="password" type="password" required placeholder="••••••••" autocomplete="new-password"/>
          <div class="strength-bar">
            <div class="strength-seg" id="sb1"></div>
            <div class="strength-seg" id="sb2"></div>
            <div class="strength-seg" id="sb3"></div>
            <div class="strength-seg" id="sb4"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>

        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input id="confirm-password" type="password" required placeholder="•••••••g•" autocomplete="new-password"/>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          Reset Password
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>
    </div>
  </main>
</div>

<script type="module">
  import { resetPassword, setFlash } from './assets/js/auth.js';
  import { bootstrapPublicPage } from './assets/js/app.js';

  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  });
  (function animRing() {
    rx += (mx - rx) * 0.13; ry += (my - ry) * 0.13;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animRing);
  })();

  function showFlash(msg, type = 'error') {
    const c = document.getElementById('flash-container');
    c.innerHTML = `<div class="flash flash-${type}">${msg}</div>`;
    setTimeout(() => { if(c.firstChild) c.innerHTML = ''; }, 4000);
  }

  const pwInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm-password');
  const segs = [document.getElementById('sb1'), document.getElementById('sb2'), document.getElementById('sb3'), document.getElementById('sb4')];
  const strengthLabel = document.getElementById('strength-label');

  function scorePassword(pw) {
    if (!pw) return 0;
    let s = 0;
    if (pw.length >= 8) s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    return Math.min(4, s);
  }

  pwInput.addEventListener('input', () => {
    const score = scorePassword(pwInput.value);
    const levels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const classes = ['', 'weak', 'fair', 'good', 'strong'];
    segs.forEach((s, i) => {
      s.className = 'strength-seg';
      if (i < score) s.classList.add(classes[score]);
    });
    strengthLabel.textContent = levels[score];
  });

  confirmInput.addEventListener('input', () => {
    confirmInput.classList.toggle('input-error', confirmInput.value && confirmInput.value !== pwInput.value);
  });

  await bootstrapPublicPage();

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showFlash('Invalid or missing reset token.', 'error');
    document.getElementById('submit-btn').disabled = true;
  }

  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    const password = pwInput.value;
    const btn = document.getElementById('submit-btn');

    if (password !== confirmInput.value) {
      showFlash('Passwords do not match.', 'error');
      return;
    }

    if (scorePassword(password) < 2) {
      showFlash('Please choose a stronger password.', 'error');
      return;
    }

    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = 'Updating...';

    try {
      await resetPassword(token, password);
      setFlash('Your password has been updated. Please sign in.', 'success');
      window.location.href = 'login.html';
    } catch (error) {
      showFlash(error.message || 'Unable to reset password.', 'error');
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  });
</script>
</body>
</html>
