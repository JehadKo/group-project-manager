<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Taskly</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    body { background: #f4f9f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-container { display: grid; grid-template-columns: 1fr 1.2fr; max-width: 1000px; background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 18px 40px rgba(15, 38, 31, 0.12); }
    .login-visual { background: #0d1f1a; padding: 4rem; color: white; display: flex; flex-direction: column; justify-content: center; background-image: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=800'); background-size: cover; position: relative; }
    .login-visual::before { content: ""; position: absolute; inset: 0; background: rgba(15, 118, 110, 0.85); }
    .login-visual-content { position: relative; z-index: 1; }
    .login-form-area { padding: 4rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 0.8rem; margin-bottom: 0.5rem; color: #5a7a72; text-transform: uppercase; }
    .forgot-link { text-transform: none; color: #1a9e74; text-decoration: none; font-weight: 500; }
    .input-group input { width: 100%; padding: 1rem; border: 1.5px solid #cde5dc; border-radius: 1rem; outline: none; transition: 0.2s; }
    .input-group input:focus { border-color: #1a9e74; box-shadow: 0 0 0 4px #d0f2e8; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; padding: .65rem 1.4rem; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .9rem; cursor: pointer; transition: all .2s; border: none; background: #1a9e74; color: #fff; }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-visual">
    <div class="login-visual-content">
      <h2 style="font-family: 'Syne'; font-size: 2.5rem; margin-bottom: 1rem;">Focus on the work that matters.</h2>
      <p style="opacity: 0.9; line-height: 1.6;">Taskly helps high-performing students synchronize their projects across every semester.</p>
    </div>
  </div>
  <div class="login-form-area">
    <form id="login-form">
      <h1 style="font-family: 'Syne'; margin-bottom: 0.5rem;">Sign In</h1>
      <p style="color: #5a7a72; margin-bottom: 2rem;">Don't have an account? <a href="register.html" style="color: #1a9e74; font-weight: 700;">Create one</a></p>
      <div id="flash-container"></div>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" name="email" required placeholder="name@university.edu">
      </div>
      <div class="input-group">
        <label>
          Password
          <a href="#" class="forgot-link">Forgot password?</a>
        </label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; cursor: pointer;">
        <input type="checkbox" id="rememberMe" name="rememberMe" style="width: auto; cursor: pointer;">
        <label for="rememberMe" style="margin-bottom: 0; text-transform: none; font-weight: 500; font-size: 0.85rem; cursor: pointer;">Remember me</label>
      </div>
      <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Enter Workspace</button>
    </form>
  </div>
</div>
<script type="module" src="assets/js/pages/login.js"></script>
</body>
</html>
